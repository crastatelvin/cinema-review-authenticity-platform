version: "3.9"
services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
